<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Avgångstavla</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding-top: max(10px, env(safe-area-inset-top));
    padding-right: max(10px, env(safe-area-inset-left), env(safe-area-inset-right));
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    padding-left: max(10px, env(safe-area-inset-left), env(safe-area-inset-right));
    box-sizing: border-box;
  }
  .columns {
    display: flex;
    flex: 1;
    gap: 12px;
  }
  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #111;
    border-radius: 8px;
    padding: 0;
    overflow: hidden;
    min-width: 0;
  }
  .top-row {
    display: flex;
    align-items: center;
    font-size: clamp(24px, 4.2vw, 40px);
    margin-bottom: 4px;
    min-width: 0;
  }
  .line {
    font-weight: bold;
    padding: 0.4rem;
    border-radius: 0.5rem;
    display: inline-block;
    text-align: center;
    width: 3ch;
    max-width: 3ch;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .destination {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center; /* centered by default */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-left: 5px;
    line-height: 1.2;
  }
  .destination-main {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
    width: 100%;
    justify-content: flex-start;
  }
  .destination-name {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 0 1 auto;
  }
  .destination.has-ticker {
    justify-content: flex-start; /* top align if ticker present */
  }
  .big-minutes {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(40px, 8vw, 64px);
    font-weight: 900;
    text-align: center;
    margin: 0px 0 15px;
  }
  .big-delay-text {
    font-size: clamp(12px, 2vw, 16px);
    line-height: 1.1;
    color: #f4d23c;
    text-align: center;
    margin-top: -30px;
    margin-bottom: 30px;
    min-height: 1.2em;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(16px, 3vw, 30px);
    table-layout: fixed;
  }
  th {
    text-align: left;
    color: #bbb;
    font-weight: normal;
    padding-bottom: 4px;
    border-bottom: 2px solid #444;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  td {
    padding: 2px 0;
    vertical-align: middle;
    border-bottom: 1px solid #333;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  td:nth-child(1), th:nth-child(1) {
    width: 5ch;
  }
  td:nth-child(2), th:nth-child(2) {
    width: auto;
  }
  td:nth-child(3), th:nth-child(3) {
    width: 8ch;
    text-align: right;
  }
  .next-line {
    font-weight: bold;
    padding: 0.3rem;
    border-radius: 0.5rem;
    display: inline-block;
    text-align: center;
    width: 3ch;
    min-width: 3ch;
    font-size: 0.9em;
  }
  .next-dest {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .next-time {
    text-align: right;
    white-space: nowrap;
  }
  .delay-badge {
    background: #f4d23c;
    color: #111;
    font-weight: bold;
    white-space: nowrap;
    flex-shrink: 0;
    width: fit-content;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.08rem 0.35rem;
    border-radius: 0.35rem;
    line-height: 1;
    font-size: 0.58em;
    vertical-align: middle;
  }
  .delay-badge-top {
    font-size: 0.5em;
  }
  .next-time-group {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
    width: max-content;
    margin-left: auto;
  }
  .line-wrapper {
    position: relative;
    display: inline-block;
  }
  .warning-icon {
    position: absolute;
    top: -0.25rem;
    right: 0;
    font-size: 0.8rem;
    color: yellow;
    pointer-events: none;
  }
  
  .warning-icon-top {
    position: absolute;
    top: -0.4rem;
    right: 0;
    font-size: 1rem;
    color: yellow;
    pointer-events: none;
   }
  
  .cancelled-time {
	color: red;
	text-decoration: line-through;
  }
  
  .destination-small {
	  font-size: 1em; /* smaller than normal destination */
	}

  .deviation-big {
	  font-size: 0.6em; /* larger than the table deviation */
	  color: yellow;
	}
	
	#tram-stop-devs, #train-stop-devs {
	  display: none;
	  text-align: center;
	}
  
  table tbody td {
    padding-top: 12px;
    padding-bottom: 12px;
    vertical-align: middle;
  }
  #status-bar {
    font-size: clamp(11px, 2vw, 14px) !important;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    line-height: 1.2;
  }
  #tram-stop-devs, #train-stop-devs {
    font-size: clamp(11px, 2vw, 14px) !important;
  }
  @keyframes scroll-left {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
  }
  /* NEW: bounce back and forth for long destinations */
  @keyframes scroll-bounce {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(0); }
    60%  { transform: translateX(calc(-100% + 100%)); }
    100% { transform: translateX(0); }
  }
  @media (max-width: 960px), (max-height: 720px) {
    body {
      padding-top: max(6px, env(safe-area-inset-top));
      padding-right: max(6px, env(safe-area-inset-left), env(safe-area-inset-right));
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      padding-left: max(6px, env(safe-area-inset-left), env(safe-area-inset-right));
    }

    .columns {
      /* Keep side-by-side layout even on small viewports; only reduce gap */
      gap: 8px;
    }

    .top-row {
      font-size: clamp(20px, 5.5vw, 32px);
    }

    .big-minutes {
      font-size: clamp(32px, 12vw, 56px);
      margin-bottom: 10px;
    }

    .big-delay-text {
      margin-top: -18px;
      margin-bottom: 18px;
    }

    table {
      font-size: clamp(14px, 3.8vw, 22px);
    }

    table tbody td {
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .line,
    .next-line {
      padding: 0.25rem 0.35rem;
    }
  }

  /* iOS-specific typography minima for better fit without stacking */
  html.ios .top-row {
    font-size: clamp(18px, 4vw, 32px);
  }
  html.ios .big-minutes {
    font-size: clamp(28px, 7vw, 56px);
  }
  html.ios table {
    font-size: clamp(13px, 2.7vw, 24px);
  }
  html.ios #status-bar,
  html.ios #tram-stop-devs,
  html.ios #train-stop-devs {
    font-size: clamp(10px, 1.8vw, 13px) !important;
  }
</style>
</head>
<body>
<div class="columns">
  <div class="col">
    <div class="top-row">
      <div id="tram-line" class="line">-</div>
      <div id="tram-dest" class="destination"></div>
    </div>
    <div id="tram-min" class="big-minutes">--</div>
    <table>
      <thead>
        <tr>
          <th>Linje</th>
          <th>Destination</th>
          <th>Tid</th>
        </tr>
      </thead>
      <tbody id="tram-next">
        <tr><td colspan="3" style="text-align:center;color:#bbb;">Laddar...</td></tr>
      </tbody>
    </table>
	<div id="tram-stop-devs" style="font-size:14px;color:yellow;margin-top:4px;">
		
	</div>
  </div>
  <div class="col">
    <div class="top-row">
      <div id="train-line" class="line">-</div>
      <div id="train-dest" class="destination"></div>
    </div>
    <div id="train-min" class="big-minutes">--</div>
    <table>
      <thead>
        <tr>
          <th>Linje</th>
          <th>Destination</th>
          <th>Tid</th>
        </tr>
      </thead>
      <tbody id="train-next">
        <tr><td colspan="3" style="text-align:center;color:#bbb;">Laddar...</td></tr>
      </tbody>
    </table>
	<div id="train-stop-devs" style="font-size:14px;color:yellow;margin-top:4px;">
		
	</div>
  </div>
</div>
<div id="status-bar" style="
  color:#bbb;
">
  <span id="status-left"></span>
  <span id="status-right"></span>
</div>

<script>
const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
if (isIOS) {
  document.documentElement.classList.add('ios');
}

let fitRaf = null;
function scheduleFitBoard() {
  if (fitRaf) cancelAnimationFrame(fitRaf);
  fitRaf = requestAnimationFrame(() => {
    fitRaf = null;
    fitBoardToViewport();
  });
}

// Ensure board always fits viewport: scale .columns to available width/height when needed
function fitBoardToViewport() {
  const cols = document.querySelector('.columns');
  if (!cols) return;

  // Reset transform to measure natural size
  cols.style.transition = 'transform 120ms ease-out';
  cols.style.transformOrigin = 'top left';
  cols.style.transform = 'translateX(0px) scale(1)';

  const rect = cols.getBoundingClientRect();
  const naturalW = rect.width;
  const naturalH = rect.height;

  const bodyStyle = getComputedStyle(document.body);
  const padLeft = parseFloat(bodyStyle.paddingLeft) || 0;
  const padRight = parseFloat(bodyStyle.paddingRight) || 0;

  const viewportW = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const availW = viewportW - padLeft - padRight - 2; // Safari rounding cushion
  const statusBar = document.getElementById('status-bar');
  const statusH = statusBar ? statusBar.getBoundingClientRect().height : 0;
  const availH = viewportH - statusH - 8; // small margin

  // Compute scale limited to 1 (don't upscale)
  let scaleW = naturalW > 0 ? (availW / naturalW) : 1;
  let scaleH = naturalH > 0 ? (availH / naturalH) : 1;
  let scale = Math.min(1, scaleW, scaleH);

  // iOS gets stricter floor for readability; only scale if needed after iOS-specific CSS applies.
  scale = Math.max(scale, isIOS ? 0.52 : 0.45);

  // First apply scale, then nudge horizontally if Safari sub-pixel rounding clips an edge.
  cols.style.transform = `translateX(0px) scale(${scale})`;
  const transformedRect = cols.getBoundingClientRect();
  const minLeft = padLeft;
  const maxRight = viewportW - padRight;
  let offsetX = 0;

  if (transformedRect.left < minLeft) {
    offsetX += (minLeft - transformedRect.left);
  }
  if (transformedRect.right > maxRight) {
    offsetX -= (transformedRect.right - maxRight);
  }

  cols.style.transform = `translateX(${offsetX}px) scale(${scale})`;
}

window.addEventListener('resize', scheduleFitBoard);

// Re-fit when departures are updated — observe the columns container for changes
const colsEl = document.querySelector('.columns');
if (colsEl) {
  const mo = new MutationObserver(scheduleFitBoard);
  mo.observe(colsEl, { childList: true, subtree: true, characterData: true, attributes: true });
}

// Initial fit
window.addEventListener('load', () => setTimeout(scheduleFitBoard, 50));

let currentSiteId = 7006;
let lastUpdateTime = null;
let nextUpdateIn = 30; // seconds
let lastUpdateDuration = null;
let lastUpdateSuccess = false;
let consecutiveFailureStartedAt = null;
let failedFetchCount = 0;
let batteryLevel = null;
let batteryCharging = null;
// Cache the last successful departures per prefix so we can show estimates
const lastSuccessful = {
  tram: null,
  train: null
};
const usingCache = { tram: false, train: false };

function getLineColors(designation) {
  let backgroundColor = "#555";
  let textColor = "white";
  if (["17", "18", "19"].includes(designation)) backgroundColor = "#169d4c";
  else if (["1", "2", "3", "4"].includes(designation)) backgroundColor = "#008aca";
  else if (["57", "74", "154", "164"].includes(designation)) backgroundColor = "#d61d23";
  else if (["40", "41", "42", "43", "44"].includes(designation)) backgroundColor = "#d05d9a";
  else if (["30", "31"].includes(designation)) backgroundColor = "#b65f1f";
  return { backgroundColor, textColor };
}

async function fetchDepartures() {
  const startTime = performance.now();
  nextUpdateIn = 30;
  updateStatusBar();
  // Simulation helper: add ?simulateFail=1 to the page URL to force an API failure
  try {
    const sim = new URLSearchParams(location.search).get('simulateFail');
    if (sim) {
      console.warn('Simulating API failure because simulateFail is set');
      throw new Error('Simulated failure');
    }

    const res = await fetch(`https://transport.integration.sl.se/v1/sites/${currentSiteId}/departures`);
    if (!res.ok) throw new Error(`API-svar: ${res.status} ${res.statusText}`);
    const data = await res.json();
    if (!data.departures) throw new Error("Ingen 'departures'-nyckel i API-svaret");

	const stopDevs = data.stop_deviations || [];
	updateStopDeviations(stopDevs);


    const trams = data.departures
      .filter(dep => dep.line.transport_mode === "TRAM" && dep.direction_code === 2)
      .slice(0, 3); // fetch a few more so we can skip cancellations

    const trains = data.departures
      .filter(dep => dep.line.transport_mode === "TRAIN" && dep.direction_code === 1)
      .slice(0, 3);

    lastUpdateDuration = Math.round(performance.now() - startTime);
    // Save successful results for fallback
    lastSuccessful.tram = { departures: trams, fetchedAt: Date.now() };
    lastSuccessful.train = { departures: trains, fetchedAt: Date.now() };
    usingCache.tram = false;
    usingCache.train = false;

    updateColumn("tram", trams);
    updateColumn("train", trains);
    lastUpdateSuccess = true;
    failedFetchCount = 0;
    lastUpdateTime = new Date();
    consecutiveFailureStartedAt = null;
    nextUpdateIn = 30;
    updateStatusBar();
  } catch (err) {
    console.error("Fel vid hämtning:", err);
    lastUpdateSuccess = false;
    failedFetchCount += 1;
    if (!consecutiveFailureStartedAt) {
      consecutiveFailureStartedAt = Date.now();
    }
    // Try to show cached/estimated data if we have it
    if (lastSuccessful.tram && lastSuccessful.tram.departures.length) {
      usingCache.tram = true;
      renderCachedColumn("tram");
    } else {
      showErrorState("tram");
    }

    if (lastSuccessful.train && lastSuccessful.train.departures.length) {
      usingCache.train = true;
      renderCachedColumn("train");
    } else {
      showErrorState("train");
    }
    updateStatusBar();
  }
}

function getDepartureTimestamp(dep) {
  const timeStr = dep.expected || dep.scheduled;
  if (!timeStr) return null;
  const timestamp = new Date(timeStr).getTime();
  return Number.isNaN(timestamp) ? null : timestamp;
}

function getDelayMinutes(dep) {
  const simulatedDelay = Number.parseInt(new URLSearchParams(location.search).get('simulateDelay') || '', 10);
  if (!Number.isNaN(simulatedDelay) && simulatedDelay > 3) {
    return simulatedDelay;
  }

  if (!dep?.expected || !dep?.scheduled) return null;
  const expected = new Date(dep.expected).getTime();
  const scheduled = new Date(dep.scheduled).getTime();
  if (Number.isNaN(expected) || Number.isNaN(scheduled)) return null;

  const diffMin = Math.round((expected - scheduled) / 60000);
  return diffMin > 3 ? diffMin : null;
}

function adjustedDeparturesFromCache(departures) {
  const now = Date.now();
  return departures
    .map(dep => {
      const copy = JSON.parse(JSON.stringify(dep));
      const timestamp = getDepartureTimestamp(copy);

      if (timestamp === null) {
        copy.display = copy.display || "--";
        copy._minutesUntil = Number.POSITIVE_INFINITY;
        copy._keepUntil = Number.POSITIVE_INFINITY;
        return copy;
      }

      const msUntil = timestamp - now;
      const minutesUntil = Math.ceil(msUntil / 60000);
      copy._minutesUntil = minutesUntil;
      copy._keepUntil = timestamp + 60000;

      if (minutesUntil <= 0) {
        copy.display = "Nu";
      } else {
        copy.display = `${minutesUntil} min`;
      }

      return copy;
    })
    .filter(dep => dep._keepUntil === Number.POSITIVE_INFINITY || now < dep._keepUntil)
    .sort((a, b) => {
      const timeA = getDepartureTimestamp(a) ?? Number.POSITIVE_INFINITY;
      const timeB = getDepartureTimestamp(b) ?? Number.POSITIVE_INFINITY;
      return timeA - timeB;
    });
}

function renderCachedColumn(prefix) {
  const cached = lastSuccessful[prefix];
  if (!cached?.departures?.length) {
    showErrorState(prefix);
    return;
  }

  const adjusted = adjustedDeparturesFromCache(cached.departures);
  if (!adjusted.length) {
    usingCache[prefix] = false;
    showErrorState(prefix);
    return;
  }

  updateColumn(prefix, adjusted, { cached: true, cachedAt: cached.fetchedAt });
}

function hasCacheGraceExpired() {
  if (!consecutiveFailureStartedAt) return false;
  return (Date.now() - consecutiveFailureStartedAt) >= 5 * 60 * 1000;
}

function updateColumn(prefix, departures, opts = {}) {
  const lineEl = document.getElementById(`${prefix}-line`);
  const destEl = document.getElementById(`${prefix}-dest`);
  const minEl = document.getElementById(`${prefix}-min`);
  const tbody = document.getElementById(`${prefix}-next`);

  destEl.classList.remove("has-ticker");
  const oldTicker = destEl.querySelector(".ticker");
  if (oldTicker) oldTicker.remove();

  if (!departures.length) {
    showErrorState(prefix);
    return;
  }

  // Pick first non-cancelled for top row
  const firstNonCancelled = departures.find(dep =>
    dep.journey?.state !== "CANCELLED" && dep.state !== "CANCELLED"
  );
  const first = firstNonCancelled || departures[0];
  const tableItems = departures.filter(dep => dep !== first);

  const designation = first.line.designation || first.line.name || "-";
  const colors = getLineColors(designation);
  const topDelay = getDelayMinutes(first);

  // Top row
  const isCached = !!opts.cached;
  lineEl.innerHTML = `
  <span class="line-wrapper">
    <span class="line" style="background:${colors.backgroundColor};color:${colors.textColor};">
      ${designation}
    </span>
    ${first.deviations && first.deviations.length
      ? `<span class="warning-icon-top">🟡</span>`
      : ""}
  </span>
`;

  destEl.innerHTML = '';
  const destRow = document.createElement('div');
  destRow.className = 'destination-main';
  const destText = document.createElement('span');
  destText.className = 'destination-name';
  destText.textContent = first.destination;
  destRow.appendChild(destText);
  destEl.appendChild(destRow);

  requestAnimationFrame(() => {
    if (!first.deviations?.length && destText.scrollWidth > destEl.clientWidth) {
      destText.style.display = 'inline-block';
      destText.style.animation = 'scroll-bounce 8s ease-in-out infinite';
      scheduleFitBoard();
    }
  });

  // Keep cached countdowns looking like the live board.
  minEl.textContent = first.display;
  minEl.style.color = '';
  minEl.style.textDecoration = "";

  let bigDelayEl = document.getElementById(`${prefix}-delay`);
  if (!bigDelayEl) {
    bigDelayEl = document.createElement('div');
    bigDelayEl.id = `${prefix}-delay`;
    bigDelayEl.className = 'big-delay-text';
    minEl.insertAdjacentElement('afterend', bigDelayEl);
  }
  bigDelayEl.textContent = topDelay !== null ? `Försenad ${topDelay} min` : '';

  // Delay highlighting
  if (first.state !== "CANCELLED" && first.expected && first.scheduled) {
    const scheduled = new Date(first.scheduled);
    const expected = new Date(first.expected);
    const diffMin = Math.round((expected - scheduled) / 60000);
  }

  // Top-row ticker for deviations
  if (first.deviations && first.deviations.length) {
  const devMsg = first.deviations
    .map(dev => dev.message)
    .filter(msg => msg.trim().toLowerCase() !== "inställd")
    .join(" | ");
  if (devMsg) {
    destEl.classList.add("has-ticker");

    // Destination container
    destEl.innerHTML = '';
    const destContainer = document.createElement("div");
    destContainer.className = "destination-main";
    const destLabel = document.createElement("span");
    destLabel.className = "destination-name";
    destLabel.textContent = first.destination;
    destContainer.appendChild(destLabel);
    destEl.appendChild(destContainer);

    setTimeout(() => {
      // Shrink destination text
      destContainer.classList.add("destination-small");

      // Deviation container
      const scrollDiv = document.createElement("div");
      scrollDiv.classList.add("deviation-big");
      scrollDiv.style.whiteSpace = "nowrap";
      scrollDiv.style.overflow = "hidden";

      const scrollText = document.createElement("div");
      scrollText.textContent = devMsg;
      scrollText.style.display = "inline-block";
      scrollText.style.paddingLeft = "100%";
      const charCount = scrollText.textContent.length;
      const seconds = Math.max(8, Math.min(40, charCount * 0.11));
      scrollText.style.animation = `scroll-left ${seconds}s linear 1`;

      scrollDiv.appendChild(scrollText);
      destEl.appendChild(scrollDiv);
      scheduleFitBoard();

      scrollText.addEventListener("animationend", () => {
        // Remove deviation line and restore destination size
        scrollDiv.remove();
        destContainer.classList.remove("destination-small");
        scheduleFitBoard();
      });
    }, 5000);
  }
}

  // Build table rows
  tbody.innerHTML = "";
  tableItems.forEach(dep => {
    const depDesignation = dep.line.designation || dep.line.name || "-";
    const depColors = getLineColors(depDesignation);
    const isCancelled = dep.journey?.state === "CANCELLED" || dep.state === "CANCELLED";
    const delayMinutes = getDelayMinutes(dep);
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>
        <span class="line-wrapper">
          <span class="next-line" style="background:${depColors.backgroundColor};color:${depColors.textColor};">
            ${depDesignation}
          </span>
          ${isCancelled
            ? `<span class="warning-icon">🔴</span>`
            : (dep.deviations && dep.deviations.length)
              ? `<span class="warning-icon">🟡</span>`
              : ""
          }
        </span>
      </td>
      <td class="next-dest">${dep.destination}</td>
      <td class="next-time${isCancelled ? ' cancelled-time' : ''}">
        <span class="next-time-group">
          ${delayMinutes !== null ? `<span class="delay-badge">+${delayMinutes}</span>` : ""}
          <span>${dep.display}</span>
        </span>
      </td>
    `;
    tbody.appendChild(row);

    // Delay deviation ticker in table rows
    if (dep.deviations && dep.deviations.length) {
      const devMsg = dep.deviations
        .map(dev => dev.message)
        .filter(msg => msg.trim().toLowerCase() !== "inställd")
        .join(" | ");
      if (devMsg) {
        const destCell = row.querySelector(".next-dest");
        const originalDest = destCell.textContent;
        setTimeout(() => {
          const scrollDiv = document.createElement("div");
          scrollDiv.style.whiteSpace = "nowrap";
          scrollDiv.style.overflow = "hidden";
          scrollDiv.style.fontSize = "16px";
          scrollDiv.style.color = "yellow";
          const scrollText = document.createElement("div");
          scrollText.textContent = devMsg;
          scrollText.style.display = "inline-block";
          scrollText.style.paddingLeft = "100%";
          const charCount = scrollText.textContent.length;
          const seconds = Math.max(8, Math.min(40, charCount * 0.11));
          scrollText.style.animation = `scroll-left ${seconds}s linear infinite`;
          scrollDiv.appendChild(scrollText);
          destCell.textContent = "";
          destCell.appendChild(scrollDiv);
          scheduleFitBoard();
          const revertTimeout = setTimeout(() => {
            destCell.textContent = originalDest;
            scheduleFitBoard();
          }, seconds * 1000);
          scrollDiv.addEventListener("click", () => {
            clearTimeout(revertTimeout);
            destCell.textContent = originalDest;
            scheduleFitBoard();
          });
        }, 5000);
      }
    }
  });

  scheduleFitBoard();
}

function updateStatusBar() {
  let lastUpdateStr = "--:--:--";
  let freshnessEmoji = '❌';
  let timeColor = '#bbb'; // default gray
  let includeTrailingCountdown = true;

  if (lastUpdateSuccess && lastUpdateTime) {
    lastUpdateStr = lastUpdateTime.toLocaleTimeString('sv-SE');
    const ageSeconds = Math.floor((Date.now() - lastUpdateTime.getTime()) / 1000);

    if (ageSeconds <= 60) {
      freshnessEmoji = '✅';
    } else {
      freshnessEmoji = '⚠️';
      timeColor = 'red'; // make text red if stale
    }
  }

  const isUsingCache = (!lastUpdateSuccess) && (usingCache.tram || usingCache.train);
  if (isUsingCache) {
    const withinGracePeriod = !hasCacheGraceExpired();
    includeTrailingCountdown = false;

    if (lastUpdateTime) {
      lastUpdateStr = `${lastUpdateTime.toLocaleTimeString('sv-SE')} (${nextUpdateIn}s) (${failedFetchCount})`;
    } else {
      lastUpdateStr = `Cache aktiv (${nextUpdateIn}s) (${failedFetchCount})`;
    }

    if (withinGracePeriod) {
      freshnessEmoji = '🕘';
      timeColor = 'orange';
    } else {
      freshnessEmoji = '❌';
      timeColor = 'red';
    }
  }

  let batteryStr = "";
  if (batteryLevel !== null) {
    if (batteryCharging) {
      batteryStr = `${batteryLevel}% ⚡`;
    } else {
      batteryStr = batteryLevel <= 20 ? `${batteryLevel}% 🪫` : `${batteryLevel}% 🔋`;
    }
  }

  const leftEl = document.getElementById('status-left');
  leftEl.style.color = timeColor;
  leftEl.textContent = includeTrailingCountdown
    ? `${freshnessEmoji} ${lastUpdateStr} (${nextUpdateIn}s)`
    : `${freshnessEmoji} ${lastUpdateStr}`;

  document.getElementById('status-right').textContent = batteryStr;
}


function initBatteryStatus() {
  if ('getBattery' in navigator) {
    navigator.getBattery().then(battery => {
      function updateBatteryInfo() {
        batteryLevel = Math.round(battery.level * 100);
        batteryCharging = battery.charging;
        updateStatusBar();
      }
      updateBatteryInfo();

      battery.addEventListener('levelchange', updateBatteryInfo);
      battery.addEventListener('chargingchange', updateBatteryInfo);
    });
  } else {
    console.warn('Battery API not supported in this browser.');
  }
}


let tramStopMessages = [];
let trainStopMessages = [];
let tramViewed = false;
let trainViewed = false;

function updateStopDeviations(stopDevs) {
  const prevTramMessages = [...tramStopMessages];
  const prevTrainMessages = [...trainStopMessages];

  function affectsTram(dev) {
    return dev.scope?.lines?.some(l => l.transport_mode === "TRAM");
  }
  function affectsTrain(dev) {
    return dev.scope?.lines?.some(l => l.transport_mode === "TRAIN");
  }

  tramStopMessages = stopDevs.filter(affectsTram).map(dev => dev.message);
  trainStopMessages = stopDevs.filter(affectsTrain).map(dev => dev.message);

  const tramEl = document.getElementById("tram-stop-devs");
  const trainEl = document.getElementById("train-stop-devs");

  // 🚨 Check if there are changes in messages
  const tramChanged = JSON.stringify(prevTramMessages) !== JSON.stringify(tramStopMessages);
  const trainChanged = JSON.stringify(prevTrainMessages) !== JSON.stringify(trainStopMessages);

  if (tramStopMessages.length) {
    tramEl.style.display = "block";
    tramEl.textContent = `Stationsmeddelanden för tvärbanan (${tramStopMessages.length})`;
    // If new or changed, highlight yellow
    if (tramChanged) {
      tramViewed = false;
      tramEl.style.color = "orange";
      tramEl.style.fontWeight = "bold";
    } else {
      tramEl.style.color = tramViewed ? "gray" : "orange";
      tramEl.style.fontWeight = tramViewed ? "normal" : "bold";
    }
  } else {
    tramEl.style.display = "none";
  }

  if (trainStopMessages.length) {
    trainEl.style.display = "block";
    trainEl.textContent = `Stationsmeddelanden för pendeltåg (${trainStopMessages.length})`;
    if (trainChanged) {
      trainViewed = false;
      trainEl.style.color = "orange";
      trainEl.style.fontWeight = "bold";
    } else {
      trainEl.style.color = trainViewed ? "gray" : "orange";
      trainEl.style.fontWeight = trainViewed ? "normal" : "bold";
    }
  } else {
    trainEl.style.display = "none";
  }
}

// Handle tram click
document.getElementById("tram-stop-devs").addEventListener("click", () => {
  if (tramStopMessages.length) {
    alert(tramStopMessages.join("\n\n"));
    tramViewed = true;
    document.getElementById("tram-stop-devs").style.color = "gray";
    document.getElementById("tram-stop-devs").style.fontWeight = "normal";
  } else {
    alert("Inga stationsmeddelanden.");
  }
});

// Handle train click
document.getElementById("train-stop-devs").addEventListener("click", () => {
  if (trainStopMessages.length) {
    alert(trainStopMessages.join("\n\n"));
    trainViewed = true;
    document.getElementById("train-stop-devs").style.color = "gray";
    document.getElementById("train-stop-devs").style.fontWeight = "normal";
  } else {
    alert("Inga stationsmeddelanden.");
  }
});


setInterval(() => {
  if (nextUpdateIn > 0) nextUpdateIn--;
  updateStatusBar();
}, 1000);

function showErrorState(prefix) {
  const lineContainer = document.getElementById(`${prefix}-line`);
  const innerLine = lineContainer.querySelector('.line');
  if (innerLine) {
    innerLine.style.backgroundColor = '#555';
    innerLine.style.color = 'white';
    innerLine.textContent = '-';
  } else {
    lineContainer.textContent = '-';
  }
  document.getElementById(`${prefix}-dest`).textContent = '';
  document.getElementById(`${prefix}-min`).textContent = '--';
  const delayEl = document.getElementById(`${prefix}-delay`);
  if (delayEl) {
    delayEl.textContent = '';
  }
  const tbody = document.getElementById(`${prefix}-next`);
  if (!lastSuccessful[prefix]) {
    // First launch and no cached data yet
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#bbb;">Ingen data ännu</td></tr>`;
  } else {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:#bbb;">Ingen data tillgänglig</td></tr>`;
  }
}

initBatteryStatus();
fetchDepartures();
setInterval(fetchDepartures, 30000);

// Periodically refresh cached displays so estimated times count down
function refreshCachedDisplays() {
  if (hasCacheGraceExpired()) {
    if (usingCache.tram) {
      usingCache.tram = false;
      showErrorState('tram');
    }
    if (usingCache.train) {
      usingCache.train = false;
      showErrorState('train');
    }
    updateStatusBar();
    return;
  }

  if (usingCache.tram && lastSuccessful.tram) {
    renderCachedColumn('tram');
  }
  if (usingCache.train && lastSuccessful.train) {
    renderCachedColumn('train');
  }
  updateStatusBar();
}
// update every 10 seconds while using cache
setInterval(refreshCachedDisplays, 10000);
</script>
